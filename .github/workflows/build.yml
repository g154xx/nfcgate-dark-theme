name: Build NFCGate Dark Theme APK

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Clone NFCGate v2.4.3
      run: |
        if [ ! -d "nfcgate" ]; then
          git clone --depth 1 --branch v2.4.3 https://github.com/nfcgate/nfcgate.git
        fi
    
    - name: Apply Dark Theme modifications
      run: |
        cd nfcgate
        bash ../apply-theme.sh
    
    - name: Make gradlew executable
      working-directory: nfcgate
      run: chmod +x gradlew
    
    - name: Clean and build with Gradle
      working-directory: nfcgate
      run: |
        ./gradlew clean
        ./gradlew assembleDebug
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: nfcgate-dark-theme-debug
        path: nfcgate/app/build/outputs/apk/debug/app-debug.apk
    
    - name: Build Status
      run: |
        echo "✓ Build completed successfully!"