name: Build NFCGate Dark Theme APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Install NDK
      run: |
        sdkmanager "ndk;21.4.7075529"
    
    - name: Clone NFCGate v2.4.3
      run: |
        if [ ! -d "nfcgate" ]; then
          git clone --depth 1 --branch v2.4.3 https://github.com/nfcgate/nfcgate.git
        fi
    
    - name: Apply Dark Theme modifications
      run: |
        cd nfcgate
        bash ../apply-theme.sh
    
    - name: Make gradlew executable
      working-directory: nfcgate
      run: chmod +x gradlew
    
    - name: Clean and build with Gradle
      working-directory: nfcgate
      run: |
        ./gradlew clean
        ./gradlew assembleDebug
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v3
      with:
        name: nfcgate-dark-theme-debug
        path: nfcgate/app/build/outputs/apk/debug/app-debug.apk
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: nfcgate/app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build Status
      run: |
        echo "✓ Build completed successfully!"
        echo "APK location: nfcgate/app/build/outputs/apk/debug/app-debug.apk"
